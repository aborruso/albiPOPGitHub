name: crea feed RSS c_a070

on:
#  push:
  repository_dispatch:
  schedule:
  - cron:  '50 7,10,12,19 * * *'
  workflow_dispatch:

jobs:
  scheduled:
    runs-on: ubuntu-latest
    steps:
    - name: Utilizza l'action github checkout@v2, per automatizzare il check-out
      uses: actions/checkout@v2
      with:
        fetch-depth: 0
    - name: crea cartella utente bin, copia dentro l'eseguibile di miller e scrape, installa xmlstarlet e yq
      run: |-
        mkdir -p ~/bin
        cp bin/mlr ~/bin
        cp bin/scrape ~/bin
        cp bin/rsspls ~/bin
        cd ~/bin
        chmod +x mlr
        chmod +x scrape
        chmod +x rsspls
        sudo apt-get install xmlstarlet
        pip install --user yq
    - name: scarica i dati e crea feed
      env:
        SUPER_SECRET: ${{ secrets.IFTTT }}
      run: |-
        export PATH=$PATH:~/bin
        cd ./c_a070
        chmod +x ./c_a070.sh
        for i in 1 2 3; do
          ./c_a070.sh && break
          [ $i -lt 3 ] && echo "Tentativo $i fallito, riprovo tra 30s..." && sleep 30
        done
    - name: Committa e pusha se ci sono variazioni nei dati
      run: |-
        git config user.name "automatico"
        git config user.email "actions@users.noreply.github.com"
        git add -A
        timestamp=$(date --iso-8601=seconds)
        git commit -m "c_a070, Agira: ${timestamp}" || exit 0
        git push
